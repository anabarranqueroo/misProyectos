<div class="recuperar-wrapper">
  <div class="recuperar-card">
    <div class="recuperar-header">
      <img src="assets/logo_letra.png" alt="EmpreScore" class="recuperar-logo">
      <h2 class="recuperar-titulo">Recuperar contraseña</h2>
      <p class="recuperar-subtitulo">Introduce tu email y tu nueva contraseña</p>
    </div>
    <form [formGroup]="form" (ngSubmit)="envio()">
      <div class="mb-3">
        <label class="form-label">Email</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="email" formControlName="email" class="form-control"
            [class.is-invalid]="form.get('email')?.invalid && form.get('email')?.touched"
            placeholder="Tu email registrado">
          <div class="invalid-feedback">Introduce un email válido.</div>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Nueva contraseña</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input [type]="mostrarNuevoPassword ? 'text' : 'password'" formControlName="passwordNueva"
            class="form-control"
            [class.is-invalid]="form.get('passwordNueva')?.invalid && form.get('passwordNueva')?.touched"
            placeholder="Mínimo 6 caracteres">
          <span class="input-group-text" (click)="toggleNuevoPassword()" style="cursor:pointer;">
            <i [class]="mostrarNuevoPassword ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
          </span>
          <div class="invalid-feedback">La contraseña debe tener al menos 6 caracteres.</div>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Confirmar contraseña</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
          <input [type]="mostrarConfirmar ? 'text' : 'password'" formControlName="confirmarPassword"
            class="form-control"
            [class.is-invalid]="form.get('confirmarPassword')?.touched && form.hasError('noCoinciden')"
            placeholder="Repite la nueva contraseña">
          <span class="input-group-text" (click)="toggleConfirmar()" style="cursor:pointer;">
            <i [class]="mostrarConfirmar ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
          </span>
          <div class="invalid-feedback">Las contraseñas no coinciden.</div>
        </div>
      </div>
      @if (errorMensaje) {
        <div class="alert alert-danger py-2">
          <i class="bi bi-exclamation-triangle me-2"></i>{{ errorMensaje }}
        </div>
      }
      @if (exitoMensaje) {
        <div class="alert alert-success py-2">
          <i class="bi bi-check-circle me-2"></i>{{ exitoMensaje }}
        </div>
      }
      <button type="submit" class="btn-recuperar w-100" [disabled]="cargando">
        @if (cargando) {
          <span class="spinner-border spinner-border-sm me-2"></span> Actualizando...
        } @else {
          <i class="bi bi-key me-2"></i> Actualizar contraseña
        }
      </button>
    </form>
    <button class="btn-recuperar btn-volver w-100 mt-2" routerLink="/login">
      <i class="bi bi-arrow-left me-2"></i> Volver al login
    </button>
  </div>
</div>
