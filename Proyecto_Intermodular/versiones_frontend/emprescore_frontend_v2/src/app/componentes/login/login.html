<div class="login-wrapper">
  <div class="login-card">
    <div class="login-header">
      <img src="assets/logo_letra.png" alt="EmpreScore" class="login-logo">
      <h2 class="login-titulo">Bienvenido de nuevo</h2>
      <p class="login-subtitulo">Inicia sesión en tu cuenta</p>
    </div>
    <form [formGroup]="form" (ngSubmit)="envio()">
      <div class="mb-3">
        <label class="form-label">Email</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="email" formControlName="email" class="form-control"
            [class.is-invalid]="form.get('email')?.invalid && form.get('email')?.touched"
            placeholder="example@gmail.com">
          <div class="invalid-feedback">Introduce un email válido.</div>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Contraseña</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" formControlName="password" class="form-control"
            [class.is-invalid]="form.get('password')?.invalid && form.get('password')?.touched"
            placeholder="Mínimo 6 caracteres">
          <div class="invalid-feedback">La contraseña debe tener al menos 6 caracteres.</div>
        </div>
      </div>
      @if (errorMensaje) {
        <div class="alert alert-danger py-2">
          <i class="bi bi-exclamation-triangle me-2"></i>{{ errorMensaje }}
        </div>
      }
      <button type="submit" class="btn-login w-100" [disabled]="cargando">
        @if (cargando) {
          <span class="spinner-border spinner-border-sm me-2"></span> Entrando...
        } @else {
          <i class="bi bi-box-arrow-in-right me-2"></i> Iniciar sesión
        }
      </button>
    </form>
    <button class="btn-login btn-volver w-100 mt-2" routerLink="/">
      <i class="bi bi-arrow-left me-2"></i> Volver
    </button>
    <div class="login-footer">
      <p>¿No tienes cuenta? <a routerLink="/register">Regístrate aquí</a></p>
      <p><a href="#">¿Olvidaste tu contraseña?</a></p>
    </div>
  </div>
</div>
